# Configuration for Cog ⚙️
# Reference: https://cog.run/yaml

build:
  # Z-Image requires GPU
  gpu: true
  
  # CUDA version for PyTorch compatibility
  cuda: "12.1"
  
  # System packages required for image processing
  system_packages:
    - "libgl1-mesa-glx"
    - "libglib2.0-0"
  
  # Python 3.11 for better compatibility with PyTorch ecosystem
  python_version: "3.11"
  
  # Python dependencies
  python_requirements: requirements.txt
  
  # Download model weights during build
  # This ensures weights are baked into the image
  run:
    - "pip install -U huggingface_hub"
    - "python download_weights.py"
    - "echo 'Build completed successfully!'"

# predict.py defines how predictions are run on your model
predict: "predict.py:Predictor"

# Increase timeout for model loading (default is 60s)
# Z-Image-Turbo needs more time for initial setup
image:
  # Set environment variables for better logging
  env:
    - PYTHONUNBUFFERED=1
    - CUDA_LAUNCH_BLOCKING=1
