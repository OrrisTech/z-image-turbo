name: Deploy to Replicate

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Cog
        run: pip install cog

      - name: Push to Replicate
        env:
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
        run: |
          COG_PATH=$(python -c "import cog; import os; print(os.path.dirname(cog.__file__))")/../bin/cog
          $COG_PATH login --token "$REPLICATE_API_TOKEN"
          $COG_PATH push r8.im/leizeng/z-image-turbo
