name: Deploy to Replicate

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Push to Replicate
        uses: replicate/push-action@v1
        with:
          model: leizeng/z-image-turbo
          replicate_api_token: ${{ secrets.REPLICATE_API_TOKEN }}
