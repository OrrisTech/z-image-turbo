name: Deploy to Replicate

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Cog
        run: |
          python -m pip install --upgrade pip
          python -m pip install cog

      - name: Push to Replicate
        env:
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
        run: |
          python -m pip show cog
          python -m cog login --token "$REPLICATE_API_TOKEN"
          python -m cog push r8.im/leizeng/z-image-turbo
