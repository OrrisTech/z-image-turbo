name: Deploy to Replicate

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Login to Replicate
        run: |
          echo "${{ secrets.REPLICATE_API_TOKEN }}" | docker login r8.im --username ${{ secrets.REPLICATE_API_TOKEN }} --password-stdin

      - name: Setup Cog
        uses: replicate/setup-cog@main
        with:
          replicate_api_token: ${{ secrets.REPLICATE_API_TOKEN }}

      - name: Push
        run: cog push r8.im/leizeng/z-image-turbo
